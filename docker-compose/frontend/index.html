<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎲 Dice Roller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 2.5rem;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      text-align: center;
    }

    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
    }

    label { font-size: .85rem; color: #999; }

    input[type="number"] {
      width: 70px;
      padding: .5rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 1.1rem;
      text-align: center;
    }

    button {
      width: 100%;
      padding: .8rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(233,69,96,.5);
    }

    button:active { transform: translateY(0); }

    .results {
      margin-top: 1.5rem;
      min-height: 80px;
    }

    .dice-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .die {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      border-radius: 10px;
      font-size: 1.3rem;
      font-weight: 700;
      animation: pop .3s ease;
    }

    .total {
      font-size: 1.2rem;
      color: #e94560;
      font-weight: 700;
    }

    .error { color: #ff6b6b; margin-top: 1rem; }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎲 Dice Roller</h1>

    <div class="controls">
      <div class="control-group">
        <label for="num">Dice</label>
        <input id="num" type="number" value="2" min="1" max="100" />
      </div>
      <div class="control-group">
        <label for="sides">Sides</label>
        <input id="sides" type="number" value="6" min="2" max="100" />
      </div>
    </div>

    <button id="roll-btn">Roll!</button>

    <div class="results" id="results"></div>
  </div>

  <script>
    const btn     = document.getElementById('roll-btn');
    const numIn   = document.getElementById('num');
    const sidesIn = document.getElementById('sides');
    const out     = document.getElementById('results');

    // Backend is accessed via the nginx reverse‑proxy at /api
    const API = '/api';

    btn.addEventListener('click', async () => {
      const num   = numIn.value;
      const sides = sidesIn.value;

      try {
        const res  = await fetch(`${API}/roll?num=${num}&sides=${sides}`);
        const data = await res.json();

        let html = '<div class="dice-row">';
        data.results.forEach((v, i) => {
          html += `<div class="die" style="animation-delay:${i * .06}s">${v}</div>`;
        });
        html += '</div>';
        html += `<div class="total">Total: ${data.total}</div>`;
        out.innerHTML = html;
      } catch (err) {
        out.innerHTML = `<div class="error">Could not reach backend 😢</div>`;
      }
    });
  </script>
</body>
</html>
