<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Workshop – Session 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 2.5rem;
      width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: .5rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    button {
      padding: .7rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active { transform: translateY(0); }

    #hello-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
    }

    #hello-btn:hover {
      box-shadow: 0 4px 16px rgba(99, 102, 241, .5);
    }

    #items-btn {
      background: linear-gradient(135deg, #22d3ee, #0891b2);
      color: #fff;
    }

    #items-btn:hover {
      box-shadow: 0 4px 16px rgba(34, 211, 238, .4);
    }

    .output {
      background: #0f172a;
      border-radius: 10px;
      padding: 1.2rem;
      min-height: 100px;
      text-align: left;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      font-size: .85rem;
      color: #a5f3fc;
      line-height: 1.5;
    }

    .error { color: #f87171; }

    .items-list {
      list-style: none;
      padding: 0;
    }

    .items-list li {
      padding: .3rem 0;
      color: #a5f3fc;
      font-family: 'Courier New', monospace;
    }

    .items-list li::before {
      content: '▸ ';
      color: #22d3ee;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐳 Docker Compose Demo</h1>
    <p class="subtitle">Frontend ↔ Backend communication</p>

    <div class="btn-row">
      <button id="hello-btn">Fetch Hello</button>
      <button id="items-btn">Fetch Items</button>
    </div>

    <div class="output" id="output">Click a button to call the backend API...</div>
  </div>

  <script>
    const BACKEND = 'http://localhost:8000';
    const output  = document.getElementById('output');

    document.getElementById('hello-btn').addEventListener('click', async () => {
      try {
        const res  = await fetch(`${BACKEND}/`);
        const data = await res.json();
        output.innerHTML = data.message;
        output.classList.remove('error');
      } catch (err) {
        output.innerHTML = `❌ Could not reach backend.\n\nIs the backend container running?\n${err.message}`;
        output.classList.add('error');
      }
    });

    document.getElementById('items-btn').addEventListener('click', async () => {
      try {
        const res  = await fetch(`${BACKEND}/items`);
        const data = await res.json();
        let html = '<ul class="items-list">';
        data.items.forEach(item => {
          html += `<li>${item}</li>`;
        });
        html += '</ul>';
        output.innerHTML = html;
        output.classList.remove('error');
      } catch (err) {
        output.innerHTML = `❌ Could not reach backend.\n\nIs the backend container running?\n${err.message}`;
        output.classList.add('error');
      }
    });
  </script>
</body>
</html>
